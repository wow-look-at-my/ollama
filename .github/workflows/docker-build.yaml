name: docker-build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Dockerfile.ci
        run: docker build -f Dockerfile.ci -t ollama-ci:${{ github.sha }} .
      - name: Smoke test ollama binary
        run: docker run --rm ollama-ci:${{ github.sha }} --version
